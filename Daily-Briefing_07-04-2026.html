function getLastSevenDays(){
  var result=[];var today=new Date(TODAY_DATE+"T12:00:00");
  for(var i=6;i>=0;i--){

    result.push({date:key,label:d.toLocaleDateString("en-GB",{weekday:"short"}),apps:(stateDay?stateDay.apps:0)||(saved?saved.apps:0)||0});

}

function launchWeatherAnim(code){
  var canvas=document.getElementById("wx-anim-canvas");
  if(!canvas)return;
  canvas.innerHTML="";
  var type;
  if(code===0||code===1)type="sun";
  else if(code===2||code===3)type="cloud";
  else if(code===45)type="fog";
  else if(code===48)type="ice";
  else if(code>=51&&code<=55)type="drizzle";
  else if((code>=61&&code<=65)||(code>=80&&code<=82))type="rain";
  else if(code>=71&&code<=77)type="snow";
  else if(code>=95)type="storm";
  else return;
  var W=canvas.offsetWidth||800;var H=canvas.offsetHeight||220;
  if(type==="sun"){
    var cx=W*0.85;var cy=H*0.22;
    for(var i=0;i<8;i++){
      var el=document.createElement("div");
      el.className="wx-sun-ray";
      var ang=i*45;var len=32+Math.random()*18;
      el.style.cssText="height:"+len+"px;left:"+Math.round(cx)+"px;top:"+Math.round(cy)+"px;transform:rotate("+ang+"deg);animation-duration:"+(2.4+Math.random()*1.6).toFixed(1)+"s;animation-delay:"+(Math.random()*2).toFixed(2)+"s;";
      canvas.appendChild(el);
    }
  } else if(type==="fog"||type==="cloud"){
    var count=type==="fog"?8:4;var h=type==="fog"?14:20;
    for(var i=0;i<count;i++){
      var el=document.createElement("div");
      el.className="wx-fog-band";
      el.style.cssText="top:"+(8+i*(H/count)*0.9).toFixed(0)+"px;height:"+h+"px;animation-duration:"+(4+Math.random()*4).toFixed(1)+"s;animation-delay:"+(-Math.random()*5).toFixed(2)+"s;";
      canvas.appendChild(el);
    }
  } else if(type==="ice"){
    var syms=["❄","✦","❅","✧","❆"];
    for(var i=0;i<18;i++){
      var el=document.createElement("div");
      el.className="wx-ice";
      el.textContent=syms[i%syms.length];
      el.style.cssText="left:"+(Math.random()*94).toFixed(1)+"%;top:"+(Math.random()*80).toFixed(1)+"%;animation-duration:"+(1.8+Math.random()*2.2).toFixed(1)+"s;animation-delay:"+(-Math.random()*4).toFixed(2)+"s;";
      canvas.appendChild(el);
    }
  } else if(type==="snow"){
    var flakes=["❄","❅","❆","*","·"];
    for(var i=0;i<28;i++){
      var el=document.createElement("div");
      el.className="wx-flake";
      el.textContent=flakes[i%flakes.length];
      el.style.cssText="left:"+(Math.random()*97).toFixed(1)+"%;animation-duration:"+(2.5+Math.random()*2).toFixed(1)+"s;animation-delay:"+(-Math.random()*4).toFixed(2)+"s;font-size:"+(0.65+Math.random()*0.55).toFixed(2)+"rem;";
      canvas.appendChild(el);
    }
  } else if(type==="drizzle"){
    for(var i=0;i<22;i++){
      var el=document.createElement("div");
      el.className="wx-drop light";
      el.style.cssText="left:"+(Math.random()*98).toFixed(1)+"%;height:"+(7+Math.random()*7).toFixed(0)+"px;animation-duration:"+(2+Math.random()*1.5).toFixed(2)+"s;animation-delay:"+(-Math.random()*3).toFixed(2)+"s;";
      canvas.appendChild(el);
    }
  } else if(type==="rain"||type==="storm"){
    var cls=type==="storm"?"wx-drop heavy":"wx-drop";
    var cnt=type==="storm"?38:30;
    for(var i=0;i<cnt;i++){
      var el=document.createElement("div");
      el.className=cls;
      el.style.cssText="left:"+(Math.random()*98).toFixed(1)+"%;height:"+(12+Math.random()*12).toFixed(0)+"px;animation-duration:"+(0.7+Math.random()*0.7).toFixed(2)+"s;animation-delay:"+(-Math.random()*2).toFixed(2)+"s;";
      canvas.appendChild(el);
    }
    if(type==="storm"){
      var fl=document.createElement("div");
      fl.className="wx-lightning";
      fl.style.animationDelay=(1+Math.random()*2).toFixed(1)+"s";
      canvas.appendChild(fl);
    }
  }
}

function fetchWeather(){
  fetch("https://api.open-meteo.com/v1/forecast?latitude=57.6875&longitude=-4.1613&current=temperature_2m,apparent_temperature,precipitation_probability,windspeed_10m,cloudcover,weathercode&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Europe%2FLondon&forecast_days=7&windspeed_unit=mph")
  .then(function(r){return r.json();})
  .then(function(data){
    var c=data.current;var d=data.daily;
    var code=c.weathercode;var icon=WMO_ICONS[code]||"🌡️";var desc=WMO_DESC[code]||"Variable";
    var tempC=Math.round(c.temperature_2m);var feelC=Math.round(c.apparent_temperature);
    var wind=Math.round(c.windspeed_10m);var rain=c.precipitation_probability;var cloud=c.cloudcover;
    var weekHTML="";
    for(var i=0;i<7;i++){
      var date=new Date(d.time[i]+"T12:00:00");var dayName=DAYS[date.getDay()];
      var wIcon=WMO_ICONS[d.weathercode[i]]||"🌡️";var hi=Math.round(d.temperature_2m_max[i]);var lo=Math.round(d.temperature_2m_min[i]);
      weekHTML+='<div class="day-col'+(i===0?" today":"")+'"><div class="day-name">'+dayName+'</div><div class="day-icon">'+wIcon+'</div><div class="day-temp">'+hi+'° / '+lo+'°</div></div>';
    }
    document.getElementById("weather-content").innerHTML='<div style="display:flex;align-items:center;gap:18px"><div><div class="weather-main">'+icon+' '+tempC+'°C</div><div class="weather-desc">'+desc+' · Invergordon</div></div></div><div class="weather-stats"><div class="weather-stat"><div class="weather-stat-val">'+wind+' mph</div><div class="weather-stat-lbl">💨 Wind</div></div><div class="weather-stat"><div class="weather-stat-val">'+rain+'%</div><div class="weather-stat-lbl">🌧️ Rain Chance</div></div><div class="weather-stat"><div class="weather-stat-val">'+feelC+'°C</div><div class="weather-stat-lbl">🌡️ Feels Like</div></div><div class="weather-stat"><div class="weather-stat-val">'+cloud+'%</div><div class="weather-stat-lbl">☁️ Cloud Cover</div></div></div><div class="week-grid">'+weekHTML+'</div>';
    launchWeatherAnim(code);
  })
  .catch(function(){document.getElementById("weather-content").innerHTML='<div style="color:var(--text-muted);font-size:0.85rem;">Weather data unavailable — check <a href="https://www.bbc.co.uk/weather/2646543" target="_blank" style="color:#4ade80">BBC Weather Invergordon</a></div>';});
}

function updateCountdown(){
  var now=new Date();var firstShip=new Date("2026-04-06T06:00:00");var endSeason=new Date("2026-10-14T23:59:00");
  var target=now<firstShip?firstShip:endSeason;
  var lbl=document.getElementById("cruise-season-label");
  var badge=document.getElementById("cruise-live-badge");
  if(lbl)lbl.textContent=now>=firstShip?"Season ends 14 October 2026 (AIDASol) — time remaining in your income window:":"Time until the cruise season begins:";
  if(badge)badge.textContent=now>=firstShip?"🎉 CRUISE SEASON IS LIVE!":"⏳ CRUISE SEASON INCOMING";
  var diff=Math.max(0,target-now);
  var days=Math.floor(diff/86400000);var hrs=Math.floor((diff%86400000)/3600000);
  var mins=Math.floor((diff%3600000)/60000);var secs=Math.floor((diff%60000)/1000);
  var pad=function(n){return String(n).padStart(2,"0");};
  document.getElementById("cd-days").textContent=days;document.getElementById("cd-hours").textContent=pad(hrs);
  document.getElementById("cd-mins").textContent=pad(mins);document.getElementById("cd-secs").textContent=pad(secs);
}

(function boot(){
  initState();
  if(milestones.briefing&&milestones.learn&&milestones.action&&milestones.applied)rocketFired=true;
  updateMilestoneAuto();
  if(milestones.learn){learnDone=true;var lb=document.getElementById("learn-big-box");if(lb){lb.style.background="#4ade80";lb.style.borderColor="#4ade80";lb.innerHTML='<svg width="16" height="16" viewBox="0 0 16 16"><polyline points="2.5,8 6,12 13.5,4" fill="none" stroke="#041208" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><\/svg>';}}
  if(milestones.action){actionDone=true;var box=document.getElementById("action-big-box");if(box){box.style.background="#fbbf24";box.style.borderColor="#fbbf24";box.innerHTML='<svg width="18" height="18" viewBox="0 0 18 18"><polyline points="3,9 7,14 15,4" fill="none" stroke="#041208" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><\/svg>';}var cb=document.getElementById("action-cb");if(cb)cb.checked=true;}
  renderStats();renderCharts();fetchWeather();updateCountdown();setInterval(updateCountdown,1000);
  setTimeout(function(){if(!milestones.briefing){setMilestone("briefing",true);showToast("👀 Briefing read! 3 more milestones to go.","info");}},10000);
})();
<\/script>
