<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steve's Daily Briefings — Job Coach &amp; Reskilling</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a1a0d;
    color: #e8f5e9;
    min-height: 100vh;
    padding: 32px 16px 48px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(34,85,34,0.18) 0%, transparent 60%),
      linear-gradient(135deg, #061008 0%, #0d1f0f 50%, #071210 100%);
    z-index: -1;
  }
  .container { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 1.8rem; font-weight: 800; color: #4ade80; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #a0b8a4; margin-bottom: 24px; }
  .search-box {
    width: 100%;
    padding: 10px 16px;
    border-radius: 20px;
    border: 1.5px solid rgba(74,222,128,0.35);
    background: rgba(8,22,13,0.7);
    color: #e8f5e9;
    font-size: 0.88rem;
    font-family: 'Inter', sans-serif;
    margin-bottom: 20px;
    outline: none;
  }
  .search-box:focus { border-color: #4ade80; }
  .latest-btn {
    display: inline-block;
    padding: 10px 22px;
    background: linear-gradient(135deg, #16a34a, #4ade80);
    color: #061008;
    font-weight: 700;
    font-size: 0.85rem;
    border-radius: 20px;
    text-decoration: none;
    margin-bottom: 24px;
  }
  .latest-btn:hover { opacity: 0.85; }
  .briefing-list { list-style: none; }
  .briefing-item {
    background: rgba(8,22,13,0.70);
    border: 2px solid rgba(251,130,100,0.35);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .briefing-item:hover { border-color: rgba(74,222,128,0.55); }
  .briefing-date { font-weight: 700; font-size: 0.95rem; }
  .briefing-day { font-size: 0.75rem; color: #a0b8a4; margin-top: 2px; }
  .open-btn {
    padding: 6px 16px;
    border-radius: 14px;
    border: 1.5px solid rgba(74,222,128,0.5);
    background: rgba(74,222,128,0.08);
    color: #4ade80;
    font-size: 0.75rem;
    font-weight: 600;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .open-btn:hover { background: rgba(74,222,128,0.22); }
  .footer { text-align: center; font-size: 0.72rem; color: #a0b8a4; margin-top: 32px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <h1>📋 Daily Briefings</h1>
  <div class="subtitle">Steve's Job Coach &amp; Reskilling · Invergordon, Scottish Highlands</div>

  <div id="latest-wrap"></div>

  <input class="search-box" id="search" type="text" placeholder="🔍 Search by date (e.g. April, 14, 2026)…" oninput="filterBriefings()">

  <ul class="briefing-list" id="briefing-list"></ul>

  <div class="footer">Generated by Claude · Steve's Daily Briefing System</div>
</div>

<script>
// BRIEFINGS array — append new entries here (DO NOT REBUILD)
// Format: ["DD", "MM", "YYYY", "filename.html"]
var BRIEFINGS = [
  ["14", "04", "2026", "Daily-Briefing_14-04-2026.html"]
];

var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DAYS_OF_WEEK = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function getDateStr(dd, mm, yyyy) {
  return DAYS_OF_WEEK[new Date(parseInt(yyyy), parseInt(mm)-1, parseInt(dd)).getDay()] + ', ' +
    dd + ' ' + MONTHS[parseInt(mm)-1] + ' ' + yyyy;
}

function renderLatest() {
  if (BRIEFINGS.length === 0) return;
  var latest = BRIEFINGS[BRIEFINGS.length - 1];
  var wrap = document.getElementById('latest-wrap');
  wrap.innerHTML = '<a href="' + latest[3] + '" class="latest-btn">🚀 Latest Briefing — ' + getDateStr(latest[0], latest[1], latest[2]) + ' ↗</a>';
}

function renderList(filter) {
  var list = document.getElementById('briefing-list');
  list.innerHTML = '';
  var sorted = BRIEFINGS.slice().reverse();
  sorted.forEach(function(b) {
    var dateStr = getDateStr(b[0], b[1], b[2]);
    var displayDate = b[0] + ' ' + MONTHS[parseInt(b[1])-1] + ' ' + b[2];
    if (filter) {
      var f = filter.toLowerCase();
      if (!dateStr.toLowerCase().includes(f) && !displayDate.toLowerCase().includes(f) && !b[3].includes(f)) return;
    }
    var li = document.createElement('li');
    li.className = 'briefing-item';
    li.innerHTML = '<div><div class="briefing-date">' + displayDate + '</div>' +
      '<div class="briefing-day">' + DAYS_OF_WEEK[new Date(parseInt(b[2]), parseInt(b[1])-1, parseInt(b[0])).getDay()] + '</div></div>' +
      '<a href="' + b[3] + '" class="open-btn">Open ↗</a>';
    list.appendChild(li);
  });
}

function filterBriefings() {
  var f = document.getElementById('search').value.trim();
  renderList(f || null);
}

renderLatest();
renderList(null);
</script>
</body>
</html>
